<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHT</title>
</head>

<body>

    <main class="container">

        <h1>
            FHT - Envio de Formulário
        </h1>

        <p class="main-paragraph">
            Preencha o formulário abaixo com as informações que deseja
        </p>


        <div class="forms">

            <form class="form-submit">

                <label for="nomeOferta">Oferta:</label>
                <input type="text" id="nomeOferta" name="nomeOferta">


                <label for="resultado">Resultado:</label>
                <input type="text" id="resultado" name="resultado">


                <label for="publico">Público:</label>
                <input type="text" id="publico" name="publico">


                <input type="submit" value="Enviar">

            </form>

        </div>


        <div id="resultadoRoteiro"></div>


    </main>


    <script src="script.js"></script>

</body>

</html>
